<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hong Kong Building Generator</title>
    <style>
      :root {
        color-scheme: dark;
        --accent: #8fcfff; /* icy cinematic blue */
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
      #app { width: 100vw; height: 100vh; display: block; }

      /* Letterbox bars */
      .bar {
        position: fixed;
        left: 0;
        width: 100%;
        height: 0;
        background: #000;
        z-index: 50;
        pointer-events: none;
        transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      }
      .bar.top { top: 0; }
      .bar.bottom { bottom: 0; }

      #loading {
        position: fixed;
        inset: 0;
        z-index: 70;
        display: flex;
        align-items: center;
        justify-content: center;
        font: 11px/1.5 ui-monospace, "SF Mono", monospace;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.5);
        pointer-events: none;
        user-select: none;
        transition: opacity 0.4s;
      }

      .credit {
        position: fixed;
        left: 16px;
        bottom: 14px;
        z-index: 60;
        font: 11px/1.5 ui-monospace, "SF Mono", monospace;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.4);
        text-transform: uppercase;
        pointer-events: none;
        user-select: none;
      }
      .credit b { color: var(--accent); font-weight: 600; }
      .credit a {
        color: inherit;
        pointer-events: auto;
        text-decoration: none;
        border-bottom: 1px dotted rgba(255, 255, 255, 0.35);
      }
      .credit a:hover { color: var(--accent); }

      /* ---- Stylized lil-gui panel ---- */
      .lil-gui {
        --background-color: rgba(18, 21, 28, 0.55);
        --widget-color: rgba(255, 255, 255, 0.07);
        --hover-color: rgba(255, 255, 255, 0.13);
        --focus-color: rgba(143, 207, 255, 0.35);
        --number-color: var(--accent);
        --string-color: #9fd6c2;
        --text-color: #d7d8dd;
        --title-background-color: rgba(0, 0, 0, 0.35);
        --title-text-color: #ffffff;
        --font-family: "Inter", system-ui, -apple-system, sans-serif;
        --font-size: 11px;
        --input-font-size: 11px;
        --widget-height: 24px;
        --padding: 6px;
        --spacing: 5px;
        --slider-knob-color: var(--accent);
        --slider-input-min-width: 42px;
      }
      .lil-gui.root {
        right: 14px;
        top: 14px;
        width: 312px;
        border-radius: 14px;
        overflow: hidden;
        backdrop-filter: blur(18px) saturate(1.2);
        -webkit-backdrop-filter: blur(18px) saturate(1.2);
        border: 1px solid rgba(255, 255, 255, 0.09);
        box-shadow: 0 24px 60px rgba(0, 0, 0, 0.55),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
      }
      .lil-gui.root > .title {
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        padding: 11px 12px;
        color: var(--accent);
        background: rgba(255, 255, 255, 0.03);
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .lil-gui .title {
        transition: color 0.15s ease;
      }
      .lil-gui .children { padding-bottom: 2px; }
      .lil-gui .controller { --gap: 6px; }
      .lil-gui .controller.string input,
      .lil-gui .controller.number input { border-radius: 6px; }
      .lil-gui .slider {
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
      }
      .lil-gui .slider .fill {
        background: var(--accent);
        opacity: 0.85;
      }
      .lil-gui button:hover,
      .lil-gui .controller:hover { --background-color: rgba(255, 255, 255, 0.03); }
      .lil-gui .folder > .title:hover { color: var(--accent); }
    </style>
    <script type="module" crossorigin src="./assets/index-DbvLWpv9.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <div id="bar-top" class="bar top"></div>
    <div id="bar-bottom" class="bar bottom"></div>
    <div id="loading">Loading asset kit…</div>
    <div class="credit">
      <b>HK BUILDING STUDIO</b> · drag to orbit · scroll to zoom · tweak the panel to regenerate
      · dev: <a href="https://www.linkedin.com/in/icomppower" target="_blank" rel="noopener">Johnny Lai</a>
    </div>
  </body>
</html>
